<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <title>بوابة نتائج الطلاب</title>
</head>
<body>
  <h2>بوابة نتائج الطلاب</h2>
  <input type="text" id="seatNumber" placeholder="أدخل رقم الجلوس...">
  <button id="searchBtn">بحث</button>
  <div id="loading" style="display:none;">جاري البحث...</div>
  <div id="resultBox"></div>
  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx00I2C8ggJbaOsqN2PSzjrNBPw8jMePctm3heA62u1_bgWcow72IjHUhqeBHcJR5wZ/exec";
    document.getElementById("searchBtn").addEventListener("click", function() {
      var seatNum = document.getElementById("seatNumber").value.trim();
      var loading = document.getElementById("loading");
      var resultBox = document.getElementById("resultBox");
      if(!seatNum) { alert("أدخل رقم الجلوس"); return; }
      loading.style.display = "block";
      resultBox.innerHTML = "";
      fetch(API_URL + "?id=" + encodeURIComponent(seatNum))
        .then(response => response.json())
        .then(data => {
          loading.style.display = "none";
          if(data) {
            let html = "<h3>النتيجة:</h3>";
            for (let key in data) {
              html += <p><strong>${key}:</strong> ${data[key]}</p>;
            }
            resultBox.innerHTML = html;
          } else {
            resultBox.innerHTML = "لم يتم العثور على النتيجة.";
          }
        })
        .catch(err => {
          loading.style.display = "none";
          resultBox.innerHTML = "خطأ في الاتصال بالسيرفر.";
          console.error(err);
        });
    });
  </script>
</body>
</html>
