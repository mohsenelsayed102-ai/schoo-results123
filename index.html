<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <title>بوابة نتائج الطلاب</title>
</head>
<body>
  <h2>بوابة نتائج الطلاب</h2>
  <input type="text" id="seatNumber" placeholder="أدخل رقم الجلوس...">
  <button onclick="searchResult()">بحث</button>
  <div id="loading" style="display:none;">جاري البحث...</div>
  <div id="resultBox"></div>

  <script>
    // ضع رابط الـ API الخاص بك هنا بين علامات التنصيص
    const API_URL = "https://script.google.com/macros/s/AKfycbx00I2C8ggJbaOsqN2PSzjrNBPw8jMePctm3heA62u1_bgWcow72IjHUhqeBHcJR5wZ/exec";

    function searchResult() {
      var seatNum = document.getElementById("seatNumber").value.trim();
      var loading = document.getElementById("loading");
      var resultBox = document.getElementById("resultBox");
      
      if(!seatNum) { alert("من فضلك أدخل رقم الجلوس"); return; }
      
      loading.style.display = "block";
      resultBox.innerHTML = "";
      
      fetch(API_URL + "?id=" + seatNum)
        .then(response => response.json())
        .then(data => {
          loading.style.display = "none";
          if(data && data.رقم_الجلوس) {
            let html = "<h3>النتيجة:</h3>";
            for (let key in data) {
              html += <p><strong>${key}:</strong> ${data[key]}</p>;
            }
            resultBox.innerHTML = html;
          } else {
            resultBox.innerHTML = "لم يتم العثور على نتيجة لهذا الرقم.";
          }
        })
        .catch(err => {
          loading.style.display = "none";
          resultBox.innerHTML = "حدث خطأ في الاتصال.";
        });
    }
  </script>
</body>
</html>
