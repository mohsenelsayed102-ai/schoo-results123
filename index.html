<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بوابة استعلام نتائج الطلاب</title>
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --success: #10b981;
      --success-glow: rgba(16, 185, 129, 0.3);
      --error: #f43f5e;
      --text-main: #ffffff;
      --text-muted: #cbd5e1;
    }

    /* خلفية متحركة بألوان متدرجة ومبهجة */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(-45deg, #0f172a, #1e1b4b, #2e1065, #3b0764);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: var(--text-main);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* الكارت الرئيسي بتأثير زجاجي مضيء */
    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 40px 30px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), 
                  0 0 40px rgba(99, 102, 241, 0.1);
      width: 100%;
      max-width: 480px;
      text-align: center;
      box-sizing: border-box;
      position: relative;
    }

    .logo-area {
      font-size: 55px;
      margin-bottom: 15px;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.6));
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h2 {
      margin: 0 0 10px 0;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.5px;
      background: linear-gradient(to left, #6366f1, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 2px 8px rgba(168, 85, 247, 0.3));
    }

    p.subtitle {
      color: var(--text-muted);
      margin: 0 0 35px 0;
      font-size: 15px;
    }

    .input-group {
      margin-bottom: 25px;
    }

    /* حقل إدخال مضيء وتفاعلي */
    input[type="text"] {
      width: 100%;
      padding: 16px 20px;
      box-sizing: border-box;
      background: rgba(0, 0, 0, 0.2);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      font-size: 18px;
      text-align: center;
      transition: all 0.3s ease;
      color: #ffffff;
      font-weight: 600;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
    }

    /* زر بحث قوي وله توهج عند المرور فوقه */
    button {
      width: 100%;
      background: linear-gradient(90deg, #6366f1, #a855f7);
      color: white;
      border: none;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
    }

    button:hover {
      filter: brightness(1.1);
      box-shadow: 0 0 25px rgba(168, 85, 247, 0.7);
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(1px);
    }

    /* مؤشر تحميل مضيء */
    .loading-spinner {
      display: none;
      margin: 25px auto 0 auto;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top: 4px solid #a855f7;
      border-radius: 50%;
      width: 35px;
      height: 35px;
      animation: spin 1s linear infinite;
      filter: drop-shadow(0 0 10px #a855f7);
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #msgBox {
      margin-top: 25px;
      font-weight: 600;
      font-size: 15px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }

    #resultBox {
      margin-top: 30px;
      text-align: right;
      display: none;
      animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* كارت النتيجة المضيء والمقسم بشكل رائع */
    .result-card {
      background: rgba(0, 0, 0, 0.35);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.05);
    }

    .result-title {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 15px;
      color: var(--success);
      text-shadow: 0 0 10px var(--success-glow);
    }

    .result-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 15px;
      transition: background 0.2s ease;
    }

    .result-item:hover {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 6px;
    }

    .result-item:last-child {
      border-bottom: none;
    }

    .result-item span.label {
      color: var(--text-muted);
      font-weight: 500;
    }

    .result-item span.value {
      color: #ffffff;
      font-weight: 700;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
    }
    
    /* تمييز المواد أو الدرجات بتوهج خفيف */
    .result-item:nth-child(even) span.value {
      color: #38bdf8;
      text-shadow: 0 0 8px rgba(56, 189, 248, 0.5);
    }
  </style>
</head>
<body>

<div class="container">
  <div class="logo-area">✨</div>
  <h2>بوابة نتائج الطلاب</h2>
  <p class="subtitle">أدخل رقم الجلوس للاستعلام عن النتيجة بالدرجات</p>
  
  <div class="input-group">
    <input type="text" id="seatNumber" placeholder="اكتب رقم الجلوس هنا..." autocomplete="off">
  </div>
  
  <button id="searchBtn">استعلام عن النتيجة</button>
  
  <div id="loading" class="loading-spinner"></div>
  <div id="msgBox"></div>
  
  <div id="resultBox">
    <div class="result-card">
      <div class="result-title">🎉 بيان درجات الطالب 🎉</div>
      <div id="resultCard">
        </div>
    </div>
  </div>
</div>

<script>
  // ⚠️ ضع هنا رابط جوجل شيت الطويل الخاص بك الذي ينتهي بـ /exec
  const API_URL = "https://script.google.com/macros/s/AKfycbx00I2C8ggJbaOsqN2PSzjrNBPw8jMePctm3heA62u1_bgWcow72IjHUhqeBHcJR5wZ/exec";

  document.getElementById("searchBtn").addEventListener("click", function() {
    const seatNum = document.getElementById("seatNumber").value.trim();
    const loading = document.getElementById("loading");
    const msgBox = document.getElementById("msgBox");
    const resultBox = document.getElementById("resultBox");
    const resultCard = document.getElementById("resultCard");
    
    if(!seatNum) {
      msgBox.style.color = "var(--error)";
      msgBox.innerHTML = "⚠️ برجاء كتابة رقم الجلوس أولاً!";
      return;
    }
    
    msgBox.innerHTML = "";
    resultBox.style.display = "none";
    loading.style.display = "block";
    
    fetch(API_URL + "?id=" + encodeURIComponent(seatNum))
      .then(response => {
        if (!response.ok) throw new Error();
        return response.text();
      })
      .then(text => {
        loading.style.display = "none";
        
        if (text.trim().startsWith("<!DOCTYPE") || text.trim().startsWith("<html")) {
          msgBox.style.color = "var(--error)";
          msgBox.innerHTML = "❌ خطأ في إعدادات الوصول. تأكد من ضبط الصلاحية على Anyone.";
          return;
        }

        let data;
        try {
          data = JSON.parse(text);
        } catch(e) {
          msgBox.style.color = "var(--error)";
          msgBox.innerHTML = "❌ خطأ في معالجة البيانات القادمة من السيرفر.";
          return;
        }
        
        if(data && Object.keys(data).length > 0) {
          let html = "";
          for (let key in data) {
            html += `
              <div class="result-item">
                <span class="label">${key}</span>
                <span class="value">${data[key]}</span>
              </div>
            `;
          }
          resultCard.innerHTML = html;
          resultBox.style.display = "block";
          msgBox.style.color = "var(--success)";
          msgBox.innerHTML = "🔮 تم جلب النتيجة بنجاح!";
        } else {
          msgBox.style.color = "var(--error)";
          msgBox.innerHTML = "🔍 عذراً، لم نجد أي نتيجة مرتبطة برقم الجلوس هذا.";
        }
      })
      .catch(err => {
        loading.style.display = "none";
        msgBox.style.color = "var(--error)";
        msgBox.innerHTML = "📡 فشل الاتصال بالسيرفر، تحقق من الإنترنت أو الرابط.";
      });
  });
  </script>
</body>
</html>
