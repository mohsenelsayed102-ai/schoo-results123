<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نتيجة الصف الأول الثانوي | مدرسة الشهيد حماده فهمي مباشر</title>
  
  <!-- استدعاء خطوط Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;750;800&family=Noto+Kufi+Arabic:wght@700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      /* لوحة ألوان السيبربانك نيون التكنولوجية */
      --primary: #7c3aed; 
      --primary-hover: #6d28d9;
      --success: #06b6d4; 
      --success-glow: rgba(6, 182, 212, 0.4);
      --error: #ff0055; 
      --error-glow: rgba(255, 0, 85, 0.4);
      --text-main: #ffffff;
      --text-muted: #94a3b8;
      
      --font-main: 'Tajawal', 'Segoe UI', sans-serif;
      --font-title: 'GE SS Unique Bold', 'Noto Kufi Arabic', 'Tajawal', sans-serif;
    }

    /* خلفية سيبربانك متحركة */
    body {
      font-family: var(--font-main);
      background: linear-gradient(-45deg, #083344, #1e1b4b, #164e63, #020617);
      background-size: 400% 400%;
      animation: gradientBG 12s ease infinite; 
      color: var(--text-main);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
      box-sizing: border-box;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* كارت حاوي زجاجي مستقبلي */
    .container {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 40px 30px 25px 30px;
      border-radius: 24px;
      border: 1px solid rgba(124, 58, 237, 0.2);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 
                  0 0 30px rgba(124, 58, 237, 0.25);
      width: 100%;
      max-width: 480px;
      text-align: center;
      box-sizing: border-box;
      position: relative;
      transition: all 0.5s ease-in-out;
    }

    /* تأثيرات الاختفاء والظهور السلس */
    .fade-out {
      opacity: 0;
      display: none !important;
    }

    /* منطقة الشعار والعناوين والمدخلات */
    .search-section {
      transition: all 0.4s ease;
    }

    .logo-area {
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }

    .logo-img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      border-radius: 50%;
      background: #ffffff;
      padding: 6px;
      border: 2px solid rgba(6, 182, 212, 0.4); 
      box-shadow: 0 0 25px rgba(6, 182, 212, 0.3);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    h1.school-title {
      font-family: var(--font-title);
      margin: 0 0 12px 0;
      font-size: 22px;
      font-weight: 800;
      line-height: 1.4;
      background: linear-gradient(to left, #ffffff, #99f6e4, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 2px 8px rgba(6, 182, 212, 0.4));
    }

    .class-subtitle {
      font-family: var(--font-main);
      font-size: 19px;
      font-weight: 700;
      color: #22d3ee;
      margin-bottom: 25px;
      text-shadow: 0 0 12px rgba(34, 211, 238, 0.5);
    }

    .input-group {
      margin-bottom: 20px;
    }

    input[type="text"] {
      font-family: var(--font-main);
      width: 100%;
      padding: 16px 20px;
      box-sizing: border-box;
      background: rgba(0, 0, 0, 0.4);
      border: 2px solid rgba(6, 182, 212, 0.15);
      border-radius: 14px;
      font-size: 18px;
      text-align: center;
      transition: all 0.3s ease;
      color: #ffffff;
      font-weight: 600;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #06b6d4;
      background: rgba(0, 0, 0, 0.6);
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.5);
    }

    button#searchBtn {
      font-family: var(--font-main);
      width: 100%;
      background: linear-gradient(90deg, #06b6d4, #7c3aed);
      color: white;
      border: none;
      padding: 16px;
      font-size: 17px;
      font-weight: 700;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
    }

    button#searchBtn:hover {
      filter: brightness(1.2);
      box-shadow: 0 0 30px rgba(124, 58, 237, 0.7);
      transform: translateY(-2px);
    }

    /* مؤشر تحميل مضيء */
    .loading-spinner {
      display: none;
      margin: 25px auto 0 auto;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top: 4px solid #7c3aed;
      border-radius: 50%;
      width: 35px;
      height: 35px;
      animation: spin 1s linear infinite;
      filter: drop-shadow(0 0 10px #7c3aed);
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #msgBox {
      margin-top: 25px;
      font-weight: 600;
      font-size: 15px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    /* منطقة عرض النتيجة فقط */
    #resultBox {
      text-align: right;
      display: none;
      animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-card {
      background: rgba(2, 6, 17, 0.7);
      border-radius: 16px;
      padding: 25px 20px;
      border: 1px solid rgba(6, 182, 212, 0.25);
      box-shadow: inset 0 0 20px rgba(6, 182, 212, 0.05);
    }

    .result-title {
      text-align: center;
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 20px;
      color: #22d3ee;
      text-shadow: 0 0 10px rgba(34, 211, 238, 0.4);
      border-bottom: 2px dashed rgba(6, 182, 212, 0.2);
      padding-bottom: 12px;
    }

    .result-item {
      display: flex;
      justify-content: space-between;
      padding: 14px 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 16px;
    }

    .result-item span.label {
      color: var(--text-muted);
      font-weight: 500;
    }

    .result-item span.value {
      color: #ffffff;
      font-weight: 700;
    }

    .status-success {
      color: #22d3ee !important; 
      text-shadow: 0 0 12px rgba(34, 211, 238, 0.6) !important;
    }

    .status-error {
      color: var(--error) !important;
      text-shadow: 0 0 12px var(--error-glow) !important;
    }

    .percentage-style {
      color: #f472b6 !important;
      text-shadow: 0 0 15px rgba(244, 114, 182, 0.7) !important;
    }

    /* زر "بحث جديد" الأنيق للعودة عند الحاجة */
    .back-btn {
      font-family: var(--font-main);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-muted);
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 20px;
      width: 100%;
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      background: rgba(124, 58, 237, 0.2);
      border-color: var(--primary);
      color: #ffffff;
    }

    .credits {
      margin-top: 30px;
      font-size: 10px;
      color: rgba(6, 182, 212, 0.3); 
      letter-spacing: 1px;
      font-family: 'Consolas', 'Courier New', monospace;
      text-align: left;
      padding-left: 5px;
    }
  </style>
</head>
<body>

<div class="container">
  
  <!-- قسم البحث بالكامل (سيختفي فور العثور على النتيجة) -->
  <div id="searchSection" class="search-section">
    <div class="logo-area">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRef5idcLoAv_1MLhlacUkSOZUGm1HBSSL4PA&s" alt="شعار المدرسة" class="logo-img">
    </div>
    <h1 class="school-title">مدرسة الشهيد ملازم أول حماده فهمي مباشر الثانوية المشتركة</h1>
    <div class="class-subtitle">نتيجة الصف الأول الثانوي</div>
    <div class="input-group">
      <input type="text" id="seatNumber" placeholder="اكتب رقم الجلوس هنا..." autocomplete="off">
    </div>
    <button id="searchBtn">استعلام عن النتيجة</button>
  </div>
  
  <!-- مؤشر التحميل وصندوق رسائل الأخطاء -->
  <div id="loading" class="loading-spinner"></div>
  <div id="msgBox"></div>
  
  <!-- قسم عرض النتيجة فقط (سيظهر بمفرده) -->
  <div id="resultBox">
    <div class="result-card">
      <div class="result-title">🎉 بيان درجات الطالب 🎉</div>
      <div id="resultCard"></div>
    </div>
    <!-- زر ذكي للعودة للبحث مجدداً دون تحديث الصفحة -->
    <button class="back-btn" id="backBtn">🔍 استعلام عن رقم آخر</button>
  </div>

  <div class="credits">&lt;/&gt; MOo_7_SeN</div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbx00I2C8ggJbaOsqN2PSzjrNBPw8jMePctm3heA62u1_bgWcow72IjHUhqeBHcJR5wZ/exec";

  document.getElementById("seatNumber").addEventListener("input", function(e) {
    this.value = this.value.replace(/[^0-9]/g, '');
  });

  document.getElementById("seatNumber").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      document.getElementById("searchBtn").click();
    }
  });

  document.getElementById("searchBtn").addEventListener("click", function() {
    const seatNum = document.getElementById("seatNumber").value.trim();
    const searchSection = document.getElementById("searchSection");
    const loading = document.getElementById("loading");
    const msgBox = document.getElementById("msgBox");
    const resultBox = document.getElementById("resultBox");
    const resultCard = document.getElementById("resultCard");
    
    if(!seatNum) {
      msgBox.style.color = "var(--error)";
      msgBox.innerHTML = "⚠️ برجاء كتابة رقم الجلوس أولاً!";
      return;
    }
    
    msgBox.innerHTML = "";
    loading.style.display = "block";
    
    fetch(API_URL + "?id=" + encodeURIComponent(seatNum))
      .then(response => {
        if (!response.ok) throw new Error();
        return response.text();
      })
      .then(text => {
        loading.style.display = "none";
        
        if (text.trim().startsWith("<!DOCTYPE") || text.trim().startsWith("<html")) {
          msgBox.style.color = "var(--error)";
          msgBox.innerHTML = "❌ خطأ في إعدادات الوصول. تأكد من ضبط الصلاحية على Anyone.";
          return;
        }

        let data;
        try {
          data = JSON.parse(text);
        } catch(e) {
          msgBox.style.color = "var(--error)";
          msgBox.innerHTML = "❌ خطأ في معالجة البيانات القادمة من السيرفر.";
          return;
        }
        
        if(data && Object.keys(data).length > 0) {
          let html = "";
          let totalScore = null;

          for (let key in data) {
            let valueText = String(data[key]).trim();
            let statusClass = "class='value'";
            
            if (key.includes("المجموع")) {
              let parsedValue = parseFloat(valueText);
              if (!isNaN(parsedValue)) {
                totalScore = parsedValue;
              }
            }

            if (valueText.includes("غائب") || valueText.includes("غايب")) {
              statusClass = "class='value status-error'";
            }
            else if (valueText.includes("ناقل") || valueText.includes("منقول")) {
              statusClass = "class='value status-success'";
            }
            else if (valueText.includes("رسوب") || valueText.includes("راسب") || valueText.includes("ربع") || key.includes("رسوب")) {
              statusClass = "class='value status-error'";
            }

            html += `
              <div class="result-item">
                <span class="label">${key}</span>
                <span ${statusClass}>${valueText}</span>
              </div>
            `;

            if (key.includes("المجموع") && totalScore !== null) {
              let percentage = ((totalScore / 600) * 100).toFixed(2);
              html += `
                <div class="result-item">
                  <span class="label">النسبة المئوية</span>
                  <span class="value percentage-style">${percentage}%</span>
                </div>
              `;
              totalScore = null; 
            }
          }
          
          // 🔥 السحر هنا: إخفاء قسم البحث بالكامل وإظهار النتيجة فقط
          searchSection.classList.add("fade-out"); 
          msgBox.innerHTML = ""; 
          
          resultCard.innerHTML = html;
          resultBox.style.display = "block";
        } else {
          msgBox.style.color = "var(--error)";
          msgBox.innerHTML = "🔍 عذراً، لم نجد أي نتيجة مرتبطة برقم الجلوس هذا.";
        }
      })
      .catch(err => {
        loading.style.display = "none";
        msgBox.style.color = "var(--error)";
        msgBox.innerHTML = "📡 فشل الاتصال بالسيرفر، تحقق من الإنترنت أو الرابط.";
      });
  });

  // تفعيل عمل زر "استعلام عن رقم آخر" لإعادة إظهار صندوق البحث
  document.getElementById("backBtn").addEventListener("click", function() {
    document.getElementById("searchSection").classList.remove("fade-out");
    document.getElementById("resultBox").style.display = "none";
    document.getElementById("seatNumber").value = ""; // تنظيف الخانة لبحث جديد
    document.getElementById("seatNumber").focus();
  });
</script>
</body>
</html>
