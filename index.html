<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نتيجة الصف الأول الثانوي | مدرسة الشهيد حماده فهمي مباشر</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;750;800&family=Noto+Kufi+Arabic:wght@700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #00b3b3; /* آكوا متزن للمساحات البيضاء */
      --primary-hover: #009999;
      --success: #00a6a6; /* آكوا للنجاح */
      --success-glow: rgba(0, 166, 166, 0.2);
      --error: #dc143c; /* كرمن */
      --error-glow: rgba(220, 20, 60, 0.2);
      --text-main: #1e293b; /* رمادي داكن جداً بديل للأسود الصريح */
      --text-muted: #64748b;
      --font-main: 'Tajawal', 'Segoe UI', sans-serif;
      --font-title: 'GE SS Unique Bold', 'Noto Kufi Arabic', 'Tajawal', sans-serif;
    }

    body {
      font-family: var(--font-main);
      /* خلفية بلانك (Blank) بيضاء ناصعة ومريحة مع تدرج خفيف جداً يمنح عمقاً ساطقاً */
      background: linear-gradient(135deg, #f8fafc, #f1f5f9, #ecfdf5, #f8fafc);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
      box-sizing: border-box;
    }

    .container {
      background: #ffffff; /* بلانك - أبيض ناصع ونظيف */
      padding: 40px 30px 25px 30px;
      border-radius: 24px;
      border: 1px solid #e2e8f0;
      /* ظلال ناعمة جداً تناسب الستقايل المودرن الفاتح */
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05), 0 1px 3px rgba(0, 0, 0, 0.02);
      width: 100%;
      max-width: 480px;
      text-align: center;
      box-sizing: border-box;
      position: relative;
      transition: all 0.5s ease-in-out;
    }

    .fade-out {
      opacity: 0;
      display: none !important;
    }

    .search-section {
      transition: all 0.4s ease;
    }

    .logo-area {
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }

    .logo-img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      border-radius: 50%;
      background: #ffffff; 
      padding: 6px;
      border: 2px solid rgba(0, 179, 179, 0.3); 
      box-shadow: 0 8px 20px rgba(0, 179, 179, 0.1);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    h1.school-title {
      font-family: var(--font-title);
      margin: 0 0 12px 0;
      font-size: 22px;
      font-weight: 800;
      line-height: 1.4;
      color: #1e293b;
    }

    .class-subtitle {
      font-family: var(--font-main);
      font-size: 19px;
      font-weight: 700;
      color: #00b3b3; /* لون الآكوا للمؤشرات الثانوية */
      margin-bottom: 25px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    input[type="text"] {
      font-family: var(--font-main);
      width: 100%;
      padding: 16px 20px;
      box-sizing: border-box;
      background: #f8fafc; /* خلفية الحقل فاتحة */
      border: 2px solid #e2e8f0;
      border-radius: 14px;
      font-size: 18px;
      text-align: center;
      transition: all 0.3s ease;
      color: var(--text-main);
      font-weight: 600;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #00b3b3; /* تركيز بلون الآكوا */
      background: #ffffff;
      box-shadow: 0 0 15px rgba(0, 179, 179, 0.15);
    }

    button#searchBtn {
      font-family: var(--font-main);
      width: 100%;
      /* مزيج ناعم ومشرق يدمج الكرمن والآكوا بسلاسة */
      background: linear-gradient(90deg, #dc143c, #00b3b3);
      color: white;
      border: none;
      padding: 16px;
      font-size: 17px;
      font-weight: 700;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 179, 179, 0.2);
    }

    button#searchBtn:hover:not(:disabled) {
      filter: brightness(1.05);
      box-shadow: 0 6px 20px rgba(0, 179, 179, 0.3);
      transform: translateY(-1px);
    }

    button#searchBtn:disabled {
      background: #e2e8f0 !important;
      color: #94a3b8 !important;
      cursor: not-allowed !important;
      box-shadow: none !important;
      transform: none !important;
    }

    .loading-spinner {
      display: none;
      margin: 25px auto 0 auto;
      border: 4px solid #e2e8f0;
      border-top: 4px solid #00b3b3;
      border-radius: 50%;
      width: 35px;
      height: 35px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #msgBox {
      margin-top: 25px;
      font-weight: 600;
      font-size: 15px;
      line-height: 1.6;
    }

    #resultBox {
      text-align: right;
      display: none;
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-card {
      background: #f8fafc; /* بطاقة النتيجة بيضاء هادئة مائلة للرمادي الخفيف جداً */
      border-radius: 16px;
      padding: 25px 20px;
      border: 1px solid #e2e8f0;
    }

    .result-title {
      text-align: center;
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 20px;
      color: #00b3b3; /* العنوان بلون الآكوا */
      border-bottom: 2px dashed #e2e8f0;
      padding-bottom: 12px;
    }

    .result-item {
      display: flex;
      justify-content: space-between;
      padding: 14px 8px;
      border-bottom: 1px solid #edf2f7;
      font-size: 16px;
    }

    .result-item span.label {
      color: var(--text-muted);
      font-weight: 500;
    }

    .result-item span.value {
      color: var(--text-main);
      font-weight: 700;
    }

    .status-success {
      color: #00a6a6 !important; /* آكوا للناجح */
    }

    .status-error {
      color: var(--error) !important; /* كرمن للراسب أو الغائب */
      font-weight: bold;
    }

    .percentage-style {
      color: #dc143c !important; /* لمسة كرمن للنسبة المئوية لتميزها */
      font-weight: 800 !important;
    }

    .back-btn {
      font-family: var(--font-main);
      background: #ffffff;
      border: 1px solid #cbd5e1;
      color: var(--text-muted);
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 20px;
      width: 100%;
      transition: all 0.2s ease;
    }

    .back-btn:hover {
      background: #f1f5f9;
      color: var(--text-main);
      border-color: #94a3b8;
    }

    .credits {
      margin-top: 30px;
      font-size: 14px;
      color: #00b3b3;
      letter-spacing: 1.5px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-weight: bold;
      text-align: center;
      display: inline-block;
      width: 100%;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

<div class="container">
  
  <div id="searchSection" class="search-section">
    <div class="logo-area">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRef5idcLoAv_1MLhlacUkSOZUGm1HBSSL4PA&s" alt="شعار المدرسة" class="logo-img">
    </div>
    <h1 class="school-title">مدرسة الشهيد ملازم أول حماده فهمي مباشر الثانوية المشتركة</h1>
    <div class="class-subtitle">نتيجة الصف الأول الثانوي</div>
    <div class="input-group">
      <input type="text" id="seatNumber" placeholder="اكتب رقم الجلوس هنا..." autocomplete="off">
    </div>
    <button id="searchBtn">استعلام عن النتيجة</button>
  </div>
  
  <div id="loading" class="loading-spinner"></div>
  <div id="msgBox"></div>
  
  <div id="resultBox">
    <div class="result-card">
      <div class="result-title">🎉 بيان درجات الطالب 🎉</div>
      <div id="resultCard"></div>
    </div>
    <button class="back-btn" id="backBtn">🔍 استعلام عن رقم آخر</button>
  </div>

  <div class="credits">&lt;/&gt; MOo_7_SeN</div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbx00I2C8ggJbaOsqN2PSzjrNBPw8jMePctm3heA62u1_bgWcow72IjHUhqeBHcJR5wZ/exec";
  
  const MAX_ATTEMPTS = 3;
  const LOCK_TIME_MS = 60 * 60 * 1000; 
  let countdownInterval = null;

  function enforceLockStatus() {
    const searchBtn = document.getElementById("searchBtn");
    const msgBox = document.getElementById("msgBox");
    const seatInput = document.getElementById("seatNumber");
    
    const lockTimestamp = localStorage.getItem("lockTimestamp");
    
    if (lockTimestamp) {
      const remainingTime = parseInt(lockTimestamp) - Date.now();
      
      if (remainingTime > 0) {
        searchBtn.disabled = true;
        seatInput.disabled = true;
        startCountdown(remainingTime);
        return true; 
      } else {
        localStorage.removeItem("lockTimestamp");
        localStorage.setItem("searchAttempts", "0");
        searchBtn.disabled = false;
        seatInput.disabled = false;
        msgBox.innerHTML = "";
        clearInterval(countdownInterval);
      }
    }
    return false; 
  }

  function startCountdown(duration) {
    const msgBox = document.getElementById("msgBox");
    clearInterval(countdownInterval);
    
    function updateTimer() {
      const now = Date.now();
      const lockTimestamp = parseInt(localStorage.getItem("lockTimestamp") || "0");
      const remaining = lockTimestamp - now;
      
      if (remaining <= 0) {
        clearInterval(countdownInterval);
        localStorage.removeItem("lockTimestamp");
        localStorage.setItem("searchAttempts", "0");
        document.getElementById("searchBtn").disabled = false;
        document.getElementById("seatNumber").disabled = false;
        msgBox.innerHTML = "✅ انتهى وقت الانتظار، يمكنك البحث الآن.";
        msgBox.style.color = "#00a6a6";
        return;
      }
      
      const minutes = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((remaining % (1000 * 60)) / 1000);
      
      msgBox.style.color = "var(--error)";
      msgBox.innerHTML = `⚠️ لقد استنفدت محاولاتك (3 مرات).<br>يرجى الانتظار ${minutes} دقيقة و ${seconds} ثانية لإعادة المحاولة.`;
    }
    
    updateTimer();
    countdownInterval = setInterval(updateTimer, 1000);
  }

  enforceLockStatus();

  document.getElementById("seatNumber").addEventListener("input", function(e) {
    this.value = this.value.replace(/[^0-9]/g, '');
  });

  document.getElementById("seatNumber").addEventListener("keypress", function(e) {
    if (e.key === "Enter" && !document.getElementById("searchBtn").disabled) {
      document.getElementById("searchBtn").click();
    }
  });

  document.getElementById("searchBtn").addEventListener("click", function() {
    if (enforceLockStatus()) return;

    const seatNum = document.getElementById("seatNumber").value.trim();
    const searchSection = document.getElementById("searchSection");
    const loading = document.getElementById("loading");
    const msgBox = document.getElementById("msgBox");
    const resultBox = document.getElementById("resultBox");
    const resultCard = document.getElementById("resultCard");
    
    if(!seatNum) {
      msgBox.style.color = "var(--error)";
      msgBox.innerHTML = "⚠️ برجاء كتابة رقم الجلوس أولاً!";
      return;
    }

    let attempts = parseInt(localStorage.getItem("searchAttempts") || "0");
    attempts++;
    localStorage.setItem("searchAttempts", attempts.toString());

    if (attempts >= MAX_ATTEMPTS) {
      const unlockTime = Date.now() + LOCK_TIME_MS;
      localStorage.setItem("lockTimestamp", unlockTime.toString());
    }
    
    msgBox.innerHTML = "";
    loading.style.display = "block";
    
    fetch(API_URL + "?id=" + encodeURIComponent(seatNum))
      .then(response => {
        if (!response.ok) throw new Error();
        return response.text();
      })
      .then(text => {
        loading.style.display = "none";
        
        if (text.trim().startsWith("<!DOCTYPE") || text.trim().startsWith("<html")) {
          msgBox.style.color = "var(--error)";
          msgBox.innerHTML = "❌ خطأ في إعدادات الوصول. تأكد من ضبط الصلاحية على Anyone.";
          enforceLockStatus();
          return;
        }

        let data;
        try {
          data = JSON.parse(text);
        } catch(e) {
          msgBox.style.color = "var(--error)";
          msgBox.innerHTML = "❌ خطأ في معالجة البيانات القادمة من السيرفر.";
          enforceLockStatus();
          return;
        }
        
        if(data && Object.keys(data).length > 0) {
          let html = "";
          let totalScore = null;

          for (let key in data) {
            let valueText = String(data[key]).trim();
            let statusClass = "class='value'";
            
            if (key.includes("المجموع")) {
              let parsedValue = parseFloat(valueText);
              if (!isNaN(parsedValue)) {
                totalScore = parsedValue;
              }
            }

            if (valueText.includes("غائب") || valueText.includes("غ")) {
              statusClass = "class='value status-error'";
            }
            else if (valueText.includes("ناقل") || valueText.includes("منقول")) {
              statusClass = "class='value status-success'";
            }
            else if (valueText.includes("رسوب") || valueText.includes("راسب") || valueText.includes("ربع") || key.includes("رسوب")) {
              statusClass = "class='value status-error'";
            }

            html += `
              <div class="result-item">
                <span class="label">${key}</span>
                <span ${statusClass}>${valueText}</span>
              </div>
            `;

            if (key.includes("المجموع") && totalScore !== null) {
              let percentage = ((totalScore / 600) * 100).toFixed(2);
              html += `
                <div class="result-item">
                  <span class="label">النسبة المئوية</span>
                  <span class="value percentage-style">${percentage}%</span>
                </div>
              `;
              totalScore = null; 
            }
          }
          
          searchSection.classList.add("fade-out"); 
          msgBox.innerHTML = ""; 
          
          resultCard.innerHTML = html;
          resultBox.style.display = "block";
        } else {
          msgBox.style.color = "var(--error)";
          msgBox.innerHTML = "🔍 عذراً، لم نجد أي نتيجة مرتبطة برقم الجلوس هذا.";
          enforceLockStatus();
        }
      })
      .catch(err => {
        loading.style.display = "none";
        msgBox.style.color = "var(--error)";
        msgBox.innerHTML = "📡 فشل الاتصال بالسيرفر، تحقق من الإنترنت أو الرابط.";
        enforceLockStatus();
      });
  });

  document.getElementById("backBtn").addEventListener("click", function() {
    document.getElementById("searchSection").classList.remove("fade-out");
    document.getElementById("resultBox").style.display = "none";
    
    if (!enforceLockStatus()) {
      document.getElementById("seatNumber").value = ""; 
      document.getElementById("seatNumber").focus();
    }
  });
  </script>
</body>
</html>
